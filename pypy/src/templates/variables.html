<h1>Hello, {{ name }}!</h1>
<p>Your balance is {{ balance }}.</p>

<h3>Nested Properties</h3>
<p>{{ user.name }}</p>
<p>{{ user.address.city }}</p>
<p>{{ order.items.0.name }}</p>

<h3>Method Calls and Slicing</h3>
<p>{{ user.t("greeting") }}</p>
<p>{{ text[:10] }}</p>
<p>{{ items[2:5] }}</p>

<h3>Auto-Escaping</h3>
<p>{{ user_input }}</p>
<div>{{ trusted_html | safe }}</div>
